<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vapor Engineering</title>
<meta name="description" content="Vapor Engineering — an independent game studio. Something is taking shape.">
<style>
  :root {
    --bg: #100e1a;
    --ink: #e8e4f2;
    --dim: #8d86a8;
    --pink: #ff5abe;
    --cyan: #78f0ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(120% 100% at 50% 0%, #1a1630 0%, var(--bg) 60%);
    color: var(--ink);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    display: grid;
    place-items: center;
    text-align: center;
    overflow: hidden;
  }
  main { padding: 2rem; max-width: 40rem; }
  .mark {
    font-size: clamp(2.2rem, 7vw, 4rem);
    font-weight: 800;
    letter-spacing: .04em;
  }
  .mark .vapor { color: var(--ink); }
  .mark .eng {
    color: var(--pink);
    text-shadow: 0 0 18px rgba(255, 90, 190, .45);
  }
  .wave {
    display: block;
    margin: 1.6rem auto 1.8rem;
    width: min(320px, 70vw);
    height: 56px;
  }
  .tag { color: var(--dim); font-size: 1.05rem; line-height: 1.6; }
  .tag b { color: var(--cyan); font-weight: 600; }
  .bars {
    width: min(320px, 70vw);
    margin: 2rem auto 0;
    display: grid;
    gap: .7rem;
  }
  .bar {
    display: grid;
    grid-template-columns: 1.4rem 1fr 2.6rem;
    align-items: center;
    gap: .6rem;
    font-size: .8rem;
    color: var(--dim);
    letter-spacing: .08em;
  }
  .bar .num { text-align: left; color: #55506b; font-weight: 600; }
  .bar .pct { text-align: right; font-variant-numeric: tabular-nums; }
  .track {
    height: 6px;
    border-radius: 3px;
    background: rgba(141, 134, 168, .18);
    overflow: hidden;
  }
  .fill {
    display: block;
    height: 100%;
    width: var(--p);
    border-radius: 3px;
    background: linear-gradient(90deg, var(--pink), var(--cyan));
    box-shadow: 0 0 10px rgba(255, 90, 190, .35);
  }
  footer {
    position: fixed;
    bottom: 1.2rem;
    width: 100%;
    color: #55506b;
    font-size: .8rem;
    letter-spacing: .06em;
  }
  @media (prefers-reduced-motion: no-preference) {
    .dash { animation: drift 6s linear infinite; }
    @keyframes drift { to { stroke-dashoffset: -120; } }
    .fill { animation: fill 1.4s cubic-bezier(.2, .8, .2, 1) backwards; }
    @keyframes fill { from { width: 0; } }
  }
</style>
</head>
<body>
<main>
  <h1 class="mark"><span class="vapor">VAPOR</span> <span class="eng">ENGINEERING</span></h1>
  <svg class="wave" viewBox="0 0 320 56" fill="none" aria-hidden="true">
    <path class="dash" d="M8 28 C 36 4, 60 4, 88 28 S 140 52, 168 28 S 220 4, 248 28"
          stroke="#ff5abe" stroke-width="5" stroke-linecap="round"
          stroke-dasharray="10 10" opacity=".9"/>
    <circle cx="272" cy="28" r="10" fill="#78f0ff">
      <animate attributeName="opacity" values="1;.5;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </svg>
  <p class="tag">An independent game studio.<br><b>Something is taking shape.</b></p>
  <div class="bars" title="you'll see">
    <div class="bar"><span class="num">I</span><span class="track"><span class="fill" style="--p:85%"></span></span><span class="pct">85%</span></div>
    <div class="bar"><span class="num">II</span><span class="track"><span class="fill" style="--p:10%"></span></span><span class="pct">10%</span></div>
    <div class="bar"><span class="num">III</span><span class="track"><span class="fill" style="--p:5%"></span></span><span class="pct">5%</span></div>
  </div>
</main>
<footer>&copy; 2026 Vapor Engineering LLC &middot; Oregon</footer>
</body>
</html>
